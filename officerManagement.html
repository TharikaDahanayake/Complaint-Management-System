<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Officer Management</title>
	<style>
		:root {
			--bg-1: #eef4ff;
			--bg-2: #f7faff;
			--panel: #ffffff;
			--ink: #1a1f16;
			--muted: #5f6758;
			--brand: #1E3A8A;
			--brand-2: #1E3A8A;
			--line: #c7d7f5;
			--error: #b91c1c;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at 10% 10%, rgba(30, 58, 138, 0.18) 0, transparent 34%),
				radial-gradient(circle at 90% 80%, rgba(30, 58, 138, 0.12) 0, transparent 35%),
				linear-gradient(120deg, var(--bg-1), var(--bg-2));
			min-height: 100vh;
			overflow-y: auto;
			padding: 20px;
		}

		.container {
			max-width: 1300px;
			margin: 0 auto;
		}

		.page-header,
		.table-section {
			background: rgba(255, 255, 255, 0.95);
			border: 1px solid var(--line);
			border-radius: 14px;
			padding: 24px;
			box-shadow: 0 4px 12px rgba(30, 58, 138, 0.06);
		}

		.page-header {
			margin-bottom: 24px;
		}

		.page-header h1 {
			margin: 0;
			font-size: 28px;
			letter-spacing: 0.4px;
			color: var(--brand);
		}

		.table-section {
			margin-bottom: 24px;
		}

		.top-bar {
			display: flex;
			gap: 12px;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 16px;
			flex-wrap: wrap;
		}

		.search-box {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.search-box label {
			font-weight: 600;
			font-size: 14px;
			color: var(--brand);
		}

		.search-box select {
			padding: 10px 12px;
			border: 1px solid var(--line);
			border-radius: 8px;
			font-size: 14px;
			min-width: 220px;
		}

		.form-section {
			display: none;
			position: fixed;
			inset: 0;
			background: rgba(12, 20, 7, 0.4);
			background: rgba(10, 24, 68, 0.46);
			padding: 24px;
			z-index: 999;
			overflow-y: auto;
		}

		.form-section.show {
			display: flex;
			align-items: flex-start;
			justify-content: center;
		}

		.form-card {
			width: min(900px, 100%);
			margin-top: 28px;
			background: #ffffff;
			border: 1px solid var(--line);
			border-radius: 14px;
			padding: 20px;
			box-shadow: 0 18px 40px rgba(30, 58, 138, 0.18);
		}

		.form-section h2,
		.table-section h2 {
			margin: 0 0 20px;
			font-size: 20px;
			color: var(--brand);
			text-transform: uppercase;
			letter-spacing: 0.8px;
		}

		.form-row {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 16px;
			margin-bottom: 16px;
		}

		.form-group {
			margin-bottom: 14px;
		}

		.form-group label {
			display: block;
			margin-bottom: 8px;
			font-weight: 600;
			font-size: 14px;
			color: var(--brand);
		}

		.form-group input,
		.form-group select {
			width: 100%;
			padding: 12px 14px;
			border: 1px solid var(--line);
			border-radius: 8px;
			font-size: 14px;
			background: var(--panel);
			color: var(--ink);
			font-family: inherit;
		}

		.form-group input:focus,
		.form-group select:focus,
		.search-box select:focus {
			outline: none;
			border-color: var(--brand);
			box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.14);
		}

		.button-group {
			display: flex;
			gap: 12px;
			margin-top: 18px;
		}

		.btn {
			padding: 12px 24px;
			border: none;
			border-radius: 8px;
			font-size: 15px;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.2s ease;
		}

		.btn-primary {
			background: linear-gradient(135deg, var(--brand), var(--brand-2));
			color: #ffffff;
		}

		.btn-primary:hover:not(:disabled) {
			transform: translateY(-1px);
			box-shadow: 0 4px 12px rgba(30, 58, 138, 0.28);
		}

		.btn-primary:disabled {
			opacity: 0.6;
			cursor: not-allowed;
		}

		.btn-secondary {
			background: #dbe7ff;
			color: var(--ink);
			border: 1px solid var(--line);
		}

		.btn-secondary:hover {
			background: #c7d7f5;
		}

		.btn-small {
			padding: 6px 12px;
			font-size: 13px;
		}

		.btn-edit {
			background: #2563eb;
			color: white;
		}

		.btn-delete {
			background: #dc2626;
			color: white;
		}

		.table-wrapper {
			overflow-x: auto;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		thead {
			background: #e8efff;
		}

		th {
			padding: 14px 12px;
			text-align: left;
			font-weight: 700;
			font-size: 13px;
			color: #000;
			text-transform: uppercase;
			letter-spacing: 0.5px;
			border-bottom: 2px solid var(--line);
		}

		td {
			padding: 14px 12px;
			border-bottom: 1px solid var(--line);
			font-size: 14px;
		}

		.actions {
			display: flex;
			gap: 8px;
		}

		.loading,
		.empty-state {
			text-align: center;
			padding: 40px 20px;
			color: var(--muted);
		}

		.spinner {
			border: 4px solid #dbe7ff;
			border-top: 4px solid var(--brand);
			border-radius: 50%;
			width: 40px;
			height: 40px;
			animation: spin 1s linear infinite;
			margin: 0 auto 16px;
		}

		@keyframes spin {
			0% { transform: rotate(0deg); }
			100% { transform: rotate(360deg); }
		}

		.error-text {
			color: var(--error);
			font-size: 13px;
			margin-top: 4px;
		}

		@media (max-width: 900px) {
			.form-row {
				grid-template-columns: 1fr;
			}

			.actions {
				flex-direction: column;
			}

			.button-group {
				flex-direction: column;
			}

			.search-box {
				width: 100%;
			}

			.search-box select {
				width: 100%;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="page-header">
			<h1>Officer Management</h1>
		</div>

		<div class="table-section">
			<div class="top-bar">
				<button type="button" class="btn btn-primary" id="addOfficerBtn">Add New Officer</button>
				<div class="search-box">
					<label for="departmentFilter">Search by Department</label>
					<select id="departmentFilter">
						<option value="">All Departments</option>
					</select>
				</div>
			</div>

			<h2>All Officers</h2>
			<div id="tableContainer">
				<div class="loading">
					<div class="spinner"></div>
					<p>Loading officers...</p>
				</div>
			</div>
		</div>

		<div class="form-section" id="officerFormSection">
			<div class="form-card">
				<h2 id="formTitle">Add New Officer</h2>
				<form id="officerForm">
					<div class="form-row">
						<div class="form-group">
							<label for="departmentName">Department Name</label>
							<input type="text" id="departmentName" name="departmentName" list="departmentList" placeholder="e.g., Traffic Department" required>
							<datalist id="departmentList"></datalist>
						</div>
						<div class="form-group">
							<label for="officerID">Officer ID</label>
							<input type="text" id="officerID" name="officerID" placeholder="e.g., OFF-TRA-001" pattern="OFF-[A-Z]{3}-[0-9]{3}" maxlength="12" title="Format: OFF-XXX-### (e.g., OFF-TRA-001)" required>
							<div class="error-text" id="officerIdError"></div>
						</div>
					</div>

					<div class="form-row">
						<div class="form-group">
							<label for="officerName">Officer Name</label>
							<input type="text" id="officerName" name="officerName" required>
						</div>
						<div class="form-group">
							<label for="officerEmail">Officer Email</label>
							<input type="email" id="officerEmail" name="officerEmail" placeholder="e.g., officer@gmail.com" required>
							<div class="error-text" id="officerEmailError"></div>
						</div>
					</div>

					<div class="form-row">
						<div class="form-group">
							<label for="officerContact">Officer Contact</label>
							<input type="tel" id="officerContact" name="officerContact" placeholder="e.g., 0771234567" required>
							<div class="error-text" id="officerContactError"></div>
						</div>
						<div class="form-group">
							<label for="rank">Rank</label>
							<input type="text" id="rank" name="rank" placeholder="e.g., Inspector" required>
						</div>
					</div>

					<div class="form-group">
						<label for="role">Role</label>
						<input type="text" id="role" name="role" placeholder="e.g., Investigation Officer" required>
					</div>

					<div class="button-group">
						<button type="submit" class="btn btn-primary" id="submitBtn">Save Officer</button>
						<button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<script type="module">
		import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
		import {
			getFirestore,
			collection,
			addDoc,
			getDocs,
			doc,
			updateDoc,
			deleteDoc,
			query,
			where
		} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

		const firebaseConfig = {
			apiKey: "AIzaSyCr5xSS_xPQO38JHoZMufQl-HEltwCvqSk",
			authDomain: "complaint-management-sys-f5d5e.firebaseapp.com",
			projectId: "complaint-management-sys-f5d5e",
			storageBucket: "complaint-management-sys-f5d5e.firebasestorage.app",
			messagingSenderId: "697751596289",
			appId: "1:697751596289:web:cd218934e92411bd7a7f00"
		};

		const app = initializeApp(firebaseConfig);
		const db = getFirestore(app);

		const stationID = localStorage.getItem("policeStationID");
		const officersRef = collection(db, "officers");
		const departmentsRef = collection(db, "departments");

		const addOfficerBtn = document.getElementById("addOfficerBtn");
		const formSection = document.getElementById("officerFormSection");
		const formTitle = document.getElementById("formTitle");
		const form = document.getElementById("officerForm");
		const submitBtn = document.getElementById("submitBtn");
		const cancelBtn = document.getElementById("cancelBtn");
		const tableContainer = document.getElementById("tableContainer");
		const departmentFilter = document.getElementById("departmentFilter");
		const departmentList = document.getElementById("departmentList");

		const departmentNameInput = document.getElementById("departmentName");
		const officerIDInput = document.getElementById("officerID");
		const officerNameInput = document.getElementById("officerName");
		const officerEmailInput = document.getElementById("officerEmail");
		const officerContactInput = document.getElementById("officerContact");
		const rankInput = document.getElementById("rank");
		const roleInput = document.getElementById("role");
		const officerIdError = document.getElementById("officerIdError");
		const officerEmailError = document.getElementById("officerEmailError");
		const officerContactError = document.getElementById("officerContactError");

		let isEditMode = false;
		let editDocId = null;
		let originalOfficerID = null;
		let originalFormValues = null;
		let officersCache = [];
		let departmentsCache = [];

		officerIDInput.addEventListener("input", function() {
			this.value = this.value.toUpperCase();
			officerIdError.textContent = "";
		});

		officerEmailInput.addEventListener("input", function() {
			officerEmailError.textContent = "";
		});

		officerContactInput.addEventListener("input", function() {
			officerContactError.textContent = "";
		});

		addOfficerBtn.addEventListener("click", () => {
			openFormForAdd();
		});

		cancelBtn.addEventListener("click", () => {
			resetForm();
		});

		formSection.addEventListener("click", (event) => {
			if (event.target === formSection) {
				resetForm();
			}
		});

		departmentFilter.addEventListener("change", () => {
			renderTable();
		});

		tableContainer.addEventListener("click", async (event) => {
			const target = event.target;
			if (!(target instanceof HTMLButtonElement)) return;

			const action = target.dataset.action;
			const docId = target.dataset.id;
			if (!action || !docId) return;

			if (action === "edit") {
				const officer = officersCache.find(item => item.docId === docId);
				if (officer) {
					openFormForEdit(officer);
				}
				return;
			}

			if (action === "delete") {
				await handleDelete(docId);
			}
		});

		form.addEventListener("submit", async (event) => {
			event.preventDefault();

			if (!stationID) {
				alert("Station ID not found. Please log in again.");
				return;
			}

			const departmentName = departmentNameInput.value.trim();
			const officerID = officerIDInput.value.trim().toUpperCase();
			const officerName = officerNameInput.value.trim();
			const officerEmail = officerEmailInput.value.trim();
			const officerContact = officerContactInput.value.trim();
			const rank = rankInput.value.trim();
			const role = roleInput.value.trim();

			if (!departmentName || !officerID || !officerName || !officerEmail || !officerContact || !rank || !role) {
				alert("All fields are required.");
				return;
			}

			if (
				isEditMode &&
				originalFormValues &&
				departmentName === originalFormValues.departmentName &&
				officerID === originalFormValues.officerID &&
				officerName === originalFormValues.officerName &&
				officerEmail === originalFormValues.officerEmail &&
				officerContact === originalFormValues.officerContact &&
				rank === originalFormValues.rank &&
				role === originalFormValues.role
			) {
				alert("No changes detected. Failed to update");
				return;
			}

			const officerIDRegex = /^OFF-[A-Z]{3}-[0-9]{3}$/;
			if (!officerIDRegex.test(officerID)) {
				officerIdError.textContent = "Officer ID format must be OFF-XXX-### (e.g., OFF-TRA-001).";
				return;
			}

			const officerEmailRegex = /^[A-Za-z0-9._%+-]+@gmail\.com$/;
			if (!officerEmailRegex.test(officerEmail)) {
				officerEmailError.textContent = "Email must end with @gmail.com (e.g., officer@gmail.com).";
				return;
			}

			const officerContactRegex = /^(?:0\d{9}|\+94\d{9})$/;
			if (!officerContactRegex.test(officerContact)) {
				officerContactError.textContent = "Contact must be 10 digits (e.g., 0771234567) or +94XXXXXXXXX.";
				return;
			}

			const departmentInfo = getDepartmentInfoByName(departmentName);
			if (!departmentInfo) {
				alert("Department name not found for this station. Please enter a valid department name.");
				return;
			}

			submitBtn.disabled = true;
			submitBtn.textContent = isEditMode ? "Updating..." : "Saving...";

			try {
				if (isEditMode) {
					if (officerID !== originalOfficerID) {
						const duplicateQuery = query(
							officersRef,
							where("officerID", "==", officerID),
							where("stationID", "==", stationID)
						);
						const duplicateSnapshot = await getDocs(duplicateQuery);
						const duplicateExists = duplicateSnapshot.docs.some(item => item.id !== editDocId);
						if (duplicateExists) {
							alert("Officer ID already exists. Please use a different ID.");
							return;
						}
					}

					await updateDoc(doc(db, "officers", editDocId), {
						departmentID: departmentInfo.departmentID,
						departmentName: departmentInfo.departmentName,
						officerContact,
						officerEmail,
						officerID,
						officerName,
						rank,
						role,
						stationID
					});
					alert("Officer updated successfully!");
				} else {
					const duplicateQuery = query(
						officersRef,
						where("officerID", "==", officerID),
						where("stationID", "==", stationID)
					);
					const duplicateSnapshot = await getDocs(duplicateQuery);
					if (!duplicateSnapshot.empty) {
						alert("Officer ID already exists. Please use a different ID.");
						return;
					}

					await addDoc(officersRef, {
						departmentID: departmentInfo.departmentID,
						departmentName: departmentInfo.departmentName,
						officerContact,
						officerEmail,
						officerID,
						officerName,
						rank,
						role,
						stationID
					});
					alert("Officer saved successfully!");
				}

				resetForm();
				await loadOfficers();
			} catch (error) {
				console.error("Error saving officer:", error);
				alert("Failed to save officer. Please try again.");
			} finally {
				submitBtn.disabled = false;
				submitBtn.textContent = isEditMode ? "Update Officer" : "Save Officer";
			}
		});

		function getDepartmentInfoByName(name) {
			const normalized = name.trim().toLowerCase();
			return departmentsCache.find(dept => (dept.departmentName || "").trim().toLowerCase() === normalized) || null;
		}

		function openFormForAdd() {
			isEditMode = false;
			editDocId = null;
			originalOfficerID = null;
			originalFormValues = null;
			formTitle.textContent = "Add New Officer";
			submitBtn.textContent = "Save Officer";
			form.reset();
			officerIdError.textContent = "";
			officerEmailError.textContent = "";
			officerContactError.textContent = "";
			formSection.classList.add("show");
		}

		function openFormForEdit(officer) {
			isEditMode = true;
			editDocId = officer.docId;
			originalOfficerID = officer.officerID;
			originalFormValues = {
				departmentName: (officer.departmentName || "").trim(),
				officerID: (officer.officerID || "").trim().toUpperCase(),
				officerName: (officer.officerName || "").trim(),
				officerEmail: (officer.officerEmail || "").trim(),
				officerContact: (officer.officerContact || "").trim(),
				rank: (officer.rank || "").trim(),
				role: (officer.role || "").trim()
			};
			formTitle.textContent = "Update Officer";
			submitBtn.textContent = "Update Officer";
			departmentNameInput.value = officer.departmentName || "";
			officerContactInput.value = officer.officerContact || "";
			officerEmailInput.value = officer.officerEmail || "";
			officerIDInput.value = officer.officerID || "";
			officerNameInput.value = officer.officerName || "";
			rankInput.value = officer.rank || "";
			roleInput.value = officer.role || "";
			officerIdError.textContent = "";
			officerEmailError.textContent = "";
			officerContactError.textContent = "";
			formSection.classList.add("show");
		}

		function resetForm() {
			isEditMode = false;
			editDocId = null;
			originalOfficerID = null;
			originalFormValues = null;
			form.reset();
			officerIdError.textContent = "";
			officerEmailError.textContent = "";
			officerContactError.textContent = "";
			formTitle.textContent = "Add New Officer";
			submitBtn.textContent = "Save Officer";
			formSection.classList.remove("show");
		}

		async function handleDelete(docId) {
			const officer = officersCache.find(item => item.docId === docId);
			const officerName = officer ? officer.officerName : "this officer";
			const confirmed = confirm(`Are you sure you want to delete ${officerName}?\n\nThis action cannot be undone.`);
			if (!confirmed) return;

			try {
				await deleteDoc(doc(db, "officers", docId));
				alert("Officer deleted successfully!");
				await loadOfficers();
			} catch (error) {
				console.error("Error deleting officer:", error);
				alert("Failed to delete officer. Please try again.");
			}
		}

		function renderDepartmentOptions() {
			departmentList.innerHTML = "";
			departmentFilter.innerHTML = '<option value="">All Departments</option>';

			const names = new Set();
			departmentsCache.forEach((dept) => {
				if (dept.departmentName) {
					names.add(dept.departmentName);
				}
			});
			officersCache.forEach((officer) => {
				if (officer.departmentName) {
					names.add(officer.departmentName);
				}
			});

			Array.from(names).sort().forEach((name) => {
				const listOption = document.createElement("option");
				listOption.value = name;
				departmentList.appendChild(listOption);

				const filterOption = document.createElement("option");
				filterOption.value = name;
				filterOption.textContent = name;
				departmentFilter.appendChild(filterOption);
			});
		}

		function renderTable() {
			const selectedDepartment = departmentFilter.value.trim().toLowerCase();
			const filteredOfficers = selectedDepartment
				? officersCache.filter(item => (item.departmentName || "").trim().toLowerCase() === selectedDepartment)
				: officersCache;

			if (filteredOfficers.length === 0) {
				tableContainer.innerHTML = `
					<div class="empty-state">
						<p>No officers found for the selected department.</p>
					</div>
				`;
				return;
			}

			let tableHTML = `
				<div class="table-wrapper">
					<table>
						<thead>
							<tr>
								<th>Department ID</th>
								<th>Officer Contact</th>
								<th>Officer Email</th>
								<th>Officer ID</th>
								<th>Officer Name</th>
								<th>Rank</th>
								<th>Role</th>
								<th>Actions</th>
							</tr>
						</thead>
						<tbody>
			`;

			filteredOfficers.forEach((officer) => {
				tableHTML += `
					<tr>
						<td>${officer.departmentID || "-"}</td>
						<td>${officer.officerContact || "-"}</td>
						<td>${officer.officerEmail || "-"}</td>
						<td>${officer.officerID || "-"}</td>
						<td>${officer.officerName || "-"}</td>
						<td>${officer.rank || "-"}</td>
						<td>${officer.role || "-"}</td>
						<td>
							<div class="actions">
								<button class="btn btn-small btn-edit" data-action="edit" data-id="${officer.docId}">Update</button>
								<button class="btn btn-small btn-delete" data-action="delete" data-id="${officer.docId}">Delete</button>
							</div>
						</td>
					</tr>
				`;
			});

			tableHTML += `
						</tbody>
					</table>
				</div>
			`;

			tableContainer.innerHTML = tableHTML;
		}

		async function loadDepartments() {
			const deptQuery = query(departmentsRef, where("stationID", "==", stationID));
			const snapshot = await getDocs(deptQuery);
			departmentsCache = snapshot.docs.map((item) => ({ docId: item.id, ...item.data() }));
		}

		async function loadOfficers() {
			try {
				tableContainer.innerHTML = `
					<div class="loading">
						<div class="spinner"></div>
						<p>Loading officers...</p>
					</div>
				`;

				const officersQuery = query(officersRef, where("stationID", "==", stationID));
				const snapshot = await getDocs(officersQuery);
				officersCache = snapshot.docs.map((item) => ({ docId: item.id, ...item.data() }));
				renderDepartmentOptions();
				renderTable();
			} catch (error) {
				console.error("Error loading officers:", error);
				tableContainer.innerHTML = `
					<div class="empty-state">
						<p style="color: var(--error);">Failed to load officers. Please refresh the page.</p>
					</div>
				`;
			}
		}

		async function initPage() {
			if (!stationID) {
				tableContainer.innerHTML = `
					<div class="empty-state">
						<p style="color: var(--error);">Station ID not found. Please log in again.</p>
					</div>
				`;
				addOfficerBtn.disabled = true;
				return;
			}

			await loadDepartments();
			await loadOfficers();
		}

		initPage();
	</script>
</body>
</html>
