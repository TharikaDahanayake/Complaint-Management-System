<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Department Management</title>
	<style>
		:root {
			--bg-1: #eef4ff;
			--bg-2: #f7faff;
			--panel: #ffffff;
			--ink: #1a1f16;
			--muted: #5f6758;
			--brand: #1E3A8A;
			--brand-2: #1E3A8A;
			--line: #c7d7f5;
			--success: #0f766e;
			--error: #b91c1c;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at 10% 10%, rgba(30, 58, 138, 0.18) 0, transparent 34%),
				radial-gradient(circle at 90% 80%, rgba(30, 58, 138, 0.12) 0, transparent 35%),
				linear-gradient(120deg, var(--bg-1), var(--bg-2));
			min-height: 100vh;
			overflow-y: auto;
			padding: 20px;
		}

		.container {
			max-width: 1200px;
			margin: 0 auto;
		}

		.page-header {
			background: rgba(255, 255, 255, 0.95);
			border: 1px solid var(--line);
			border-radius: 14px;
			padding: 24px;
			margin-bottom: 24px;
			box-shadow: 0 4px 12px rgba(30, 58, 138, 0.06);
		}

		.page-header h1 {
			margin: 0;
			font-size: 28px;
			letter-spacing: 0.4px;
			color: var(--brand);
		}

		.form-section {
			display: none;
			position: fixed;
			inset: 0;
			background: rgba(12, 20, 7, 0.4);
			padding: 24px;
			z-index: 999;
			overflow-y: auto;
			background: rgba(10, 24, 68, 0.46);
		}

		.form-section.show {
			display: flex;
			align-items: flex-start;
			justify-content: center;
		}

		.form-card {
			width: min(900px, 100%);
			margin-top: 28px;
			background: #ffffff;
			border: 1px solid var(--line);
			border-radius: 14px;
			padding: 24px;
			box-shadow: 0 18px 40px rgba(30, 58, 138, 0.18);
		}

		.form-section h2 {
			margin: 0 0 20px;
			font-size: 20px;
			color: var(--brand);
			text-transform: uppercase;
			letter-spacing: 0.8px;
		}

		.form-row {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 16px;
			margin-bottom: 16px;
		}

		.form-group {
			margin-bottom: 16px;
		}

		.form-group label {
			display: block;
			margin-bottom: 8px;
			font-weight: 600;
			font-size: 14px;
			color: var(--brand);
		}

		.form-group label small {
			font-weight: normal;
			font-size: 12px;
			color: var(--muted);
		}

		.form-group input,
		.form-group textarea {
			width: 100%;
			padding: 12px 14px;
			border: 1px solid var(--line);
			border-radius: 8px;
			font-size: 14px;
			background: var(--panel);
			color: var(--ink);
			font-family: inherit;
		}

		.form-group textarea {
			resize: vertical;
			min-height: 80px;
		}

		.form-group input:focus,
		.form-group textarea:focus {
			outline: none;
			border-color: var(--brand);
			box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.14);
		}

		.button-group {
			display: flex;
			gap: 12px;
			margin-top: 20px;
		}

		.btn {
			padding: 12px 24px;
			border: none;
			border-radius: 8px;
			font-size: 15px;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.2s ease;
		}

		.btn-primary {
			background: linear-gradient(135deg, var(--brand), var(--brand-2));
			color: #ffffff;
			flex: 1;
		}

		.top-bar .btn-primary {
			flex: 0 0 auto;
			padding: 10px 16px;
		}

		.btn-primary:hover:not(:disabled) {
			transform: translateY(-2px);
			box-shadow: 0 4px 12px rgba(30, 58, 138, 0.28);
		}

		.btn-primary:disabled {
			opacity: 0.6;
			cursor: not-allowed;
		}

		.btn-secondary {
			background: #dbe7ff;
			color: var(--ink);
			border: 1px solid var(--line);
			flex: 1;
		}

		.btn-secondary:hover {
			background: #c7d7f5;
		}

		.btn-small {
			padding: 6px 12px;
			font-size: 13px;
		}

		.btn-edit {
			background: #2563eb;
			color: white;
		}

		.btn-edit:hover {
			background: #1d4ed8;
		}

		.btn-delete {
			background: #dc2626;
			color: white;
		}

		.btn-delete:hover {
			background: #b91c1c;
		}

		.table-section {
			background: rgba(255, 255, 255, 0.95);
			border: 1px solid var(--line);
			border-radius: 14px;
			padding: 24px;
			box-shadow: 0 4px 12px rgba(30, 58, 138, 0.06);
		}

		.table-section h2 {
			margin: 0 0 20px;
			font-size: 20px;
			color: var(--brand);
			text-transform: uppercase;
			letter-spacing: 0.8px;
		}

		.top-bar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			margin-bottom: 20px;
			flex-wrap: wrap;
		}

		.search-box {
			display: flex;
			align-items: center;
			gap: 10px;
			flex-wrap: wrap;
		}

		.search-box label {
			font-weight: 600;
			font-size: 14px;
			color: var(--brand);
		}

		.search-box select {
			min-width: 260px;
			padding: 10px 12px;
			border: 1px solid var(--line);
			border-radius: 8px;
			font-size: 14px;
			background: var(--panel);
			color: var(--ink);
			font-family: inherit;
		}

		.search-box select:focus {
			outline: none;
			border-color: var(--brand);
			box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.14);
		}

		.table-wrapper {
			overflow-x: auto;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		thead {
			background: #e8efff;
		}

		th {
			padding: 14px 12px;
			text-align: left;
			font-weight: 700;
			font-size: 13px;
			color: var(--brand);
			text-transform: uppercase;
			letter-spacing: 0.5px;
			border-bottom: 2px solid var(--line);
		}

		td {
			padding: 14px 12px;
			border-bottom: 1px solid var(--line);
			font-size: 14px;
		}

		tbody tr:hover {
			background: #eef4ff;
		}

		.actions {
			display: flex;
			gap: 8px;
		}

		.loading {
			text-align: center;
			padding: 40px 20px;
			color: var(--muted);
		}

		.spinner {
			border: 4px solid #dbe7ff;
			border-top: 4px solid var(--brand);
			border-radius: 50%;
			width: 40px;
			height: 40px;
			animation: spin 1s linear infinite;
			margin: 0 auto 16px;
		}

		@keyframes spin {
			0% { transform: rotate(0deg); }
			100% { transform: rotate(360deg); }
		}

		.empty-state {
			text-align: center;
			padding: 40px 20px;
			color: var(--muted);
		}

		.empty-state p {
			margin: 0;
			font-size: 16px;
		}

		@media (max-width: 768px) {
			.form-row {
				grid-template-columns: 1fr;
			}

			.top-bar {
				flex-direction: column;
				align-items: stretch;
			}

			.search-box {
				width: 100%;
			}

			.search-box select {
				min-width: 0;
				width: 100%;
			}

			.button-group {
				flex-direction: column;
			}

			.actions {
				flex-direction: column;
			}

			.table-wrapper {
				font-size: 13px;
			}

			th, td {
				padding: 10px 8px;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="page-header">
			<h1>Department Management</h1>
		</div>

		<div class="table-section">
			<div class="top-bar">
				<button type="button" class="btn btn-primary" id="addNewBtn">Add New Department</button>
				<div class="search-box">
					<label for="departmentSearch">Search by Department</label>
					<select id="departmentSearch">
						<option value="">All Departments</option>
					</select>
				</div>
			</div>
			<h2>All Departments</h2>
			<div id="tableContainer">
				<div class="loading">
					<div class="spinner"></div>
					<p>Loading departments...</p>
				</div>
			</div>
		</div>

		<div class="form-section" id="departmentFormSection">
			<div class="form-card">
				<h2 id="formTitle">Add New Department</h2>
				<form id="departmentForm">
					<div class="form-row">
						<div class="form-group">
							<label for="departmentID">Department ID </label>
							<input type="text" id="departmentID" name="departmentID" 
							placeholder="e.g., DEP-TRA-001" 
							pattern="DEP-[A-Z]{3}-[0-9]{3}"
							maxlength="12"
							title="Format: DEP-XXX-### (e.g., DEP-TRA-001)"
							required>
					</div>
					<div class="form-group">
						<label for="departmentName">Department Name </label>
						<input type="text" id="departmentName" name="departmentName" 
							placeholder="e.g., Traffic Department" 
							required>
					</div>
				</div>
				
				<div class="button-group">
					<button type="submit" class="btn btn-primary" id="submitBtn">Add Department</button>
					<button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
				</div>
			</form>
			</div>
		</div>
	</div>

	<script type="module">
		import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
		import {
			getFirestore,
			collection,
			addDoc,
			getDocs,
			doc,
			updateDoc,
			deleteDoc,
			query,
			where
		} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

		const firebaseConfig = {
			apiKey: "AIzaSyCr5xSS_xPQO38JHoZMufQl-HEltwCvqSk",
			authDomain: "complaint-management-sys-f5d5e.firebaseapp.com",
			projectId: "complaint-management-sys-f5d5e",
			storageBucket: "complaint-management-sys-f5d5e.firebasestorage.app",
			messagingSenderId: "697751596289",
			appId: "1:697751596289:web:cd218934e92411bd7a7f00"
		};

		const app = initializeApp(firebaseConfig);
		const db = getFirestore(app);

		const form = document.getElementById("departmentForm");
		const departmentIDInput = document.getElementById("departmentID");
		const departmentNameInput = document.getElementById("departmentName");
		
		const submitBtn = document.getElementById("submitBtn");
		const cancelBtn = document.getElementById("cancelBtn");
		const formTitle = document.getElementById("formTitle");
		const tableContainer = document.getElementById("tableContainer");
		const addNewBtn = document.getElementById("addNewBtn");
		const formSection = document.getElementById("departmentFormSection");
			const departmentSearch = document.getElementById("departmentSearch");

			let departmentsCache = [];
			let selectedDepartmentName = "";

		let isEditMode = false;
		let editDocId = null;
		let originalDepartmentID = null;
		let stationID = null;

		// Get station ID from localStorage
		stationID = localStorage.getItem("policeStationID");

		// Show/hide add department form
		addNewBtn.addEventListener("click", function() {
			openFormForAdd();
		});

		// Close form when clicking on overlay
		formSection.addEventListener("click", function(event) {
			if (event.target === formSection) {
				resetForm();
			}
		});

		// Auto-convert department ID to uppercase as user types
		departmentIDInput.addEventListener("input", function(e) {
			this.value = this.value.toUpperCase();
		});

			departmentSearch.addEventListener("change", function() {
				selectedDepartmentName = this.value;
				renderDepartments();
			});

		// Load departments on page load
		loadDepartments();

		// Form submit handler
		form.addEventListener("submit", async (e) => {
			e.preventDefault();

			const departmentID = departmentIDInput.value.trim().toUpperCase();
			const departmentName = departmentNameInput.value.trim();

			// Validation
			if (!departmentID || !departmentName) {
				alert("Department ID and Department Name are required.");
				return;
			}

			// Validate Department ID format: DEP-XXX-###
			const deptIDRegex = /^DEP-[A-Z]{3}-[0-9]{3}$/;
			if (!deptIDRegex.test(departmentID)) {
				alert("Invalid Department ID format.\n\nFormat must be: DEP-XXX-###\n\nExamples:\n• DEP-TRA-001 (Traffic Department)\n• DEP-COM-002 (Community Department)\n• DEP-ENV-003 (Environmental Department)\n\nWhere:\n• XXX = 3 uppercase letters\n• ### = 3 digits (001-999)");
				return;
			}

			if (departmentName.length < 3) {
				alert("Department Name must be at least 3 characters long.");
				return;
			}

			if (!stationID) {
				alert("Station ID not found. Please log in again.");
				return;
			}

			submitBtn.disabled = true;
			submitBtn.textContent = isEditMode ? "Updating..." : "Adding...";

			try {
				if (isEditMode) {
					// If department ID changed, ensure new ID is not already used by another department
					if (departmentID !== originalDepartmentID) {
						const departmentsRef = collection(db, "departments");
						const q = query(
							departmentsRef,
							where("departmentID", "==", departmentID),
							where("stationID", "==", stationID)
						);
						const existingDept = await getDocs(q);

						const duplicateExists = existingDept.docs.some((deptDoc) => deptDoc.id !== editDocId);
						if (duplicateExists) {
							alert("Department ID already exists. Please use a different ID.");
							resetForm();
							submitBtn.disabled = false;
							submitBtn.textContent = "Update Department";
							
                           
                            return;
						}
                        
					}

					// Update existing department
					const docRef = doc(db, "departments", editDocId);
					await updateDoc(docRef, {
						departmentID: departmentID,
						departmentName: departmentName,
						stationID: stationID
					});
					alert("Department updated successfully!");
					resetForm();
				} else {
					// Check if department ID already exists
					const departmentsRef = collection(db, "departments");
					const q = query(
						departmentsRef,
						where("departmentID", "==", departmentID),
						where("stationID", "==", stationID)
					);
					const existingDept = await getDocs(q);

					if (!existingDept.empty) {
						alert("Department ID already exists. Please use a different ID.");
						resetForm();
						submitBtn.disabled = false;
						submitBtn.textContent = "Add Department";
						return;
					}

					// Add new department
					await addDoc(collection(db, "departments"), {
						departmentID: departmentID,
						departmentName: departmentName,
						stationID: stationID,
					});
					alert("Department added successfully!");
					resetForm();
				}

				loadDepartments();
			} catch (error) {
				console.error("Error saving department:", error);
				alert("Failed to save department. Please try again.");
			} finally {
				submitBtn.disabled = false;
				submitBtn.textContent = isEditMode ? "Update Department" : "Add Department";
			}
		});

		// Cancel button handler
		cancelBtn.addEventListener("click", function() {
			resetForm();
		});

		// Load all departments
		async function loadDepartments() {
			try {
				tableContainer.innerHTML = `
					<div class="loading">
						<div class="spinner"></div>
						<p>Loading departments...</p>
					</div>
				`;

				const departmentsRef = collection(db, "departments");
				const q = stationID 
					? query(departmentsRef, where("stationID", "==", stationID))
					: departmentsRef;
				
				const snapshot = await getDocs(q);
				departmentsCache = snapshot.docs.map((item) => ({ id: item.id, ...item.data() }));

				renderDepartmentOptions();
				renderDepartments();
			} catch (error) {
				console.error("Error loading departments:", error);
				tableContainer.innerHTML = `
					<div class="empty-state">
						<p style="color: var(--error);">Failed to load departments. Please refresh the page.</p>
					</div>
				`;
			}
		}

		function renderDepartmentOptions() {
			const currentValue = selectedDepartmentName;
			const departmentNames = Array.from(new Set(
				departmentsCache
					.map((department) => (department.departmentName || "").trim())
					.filter(Boolean)
			));

			departmentSearch.innerHTML = '<option value="">All Departments</option>';
			departmentNames.sort((a, b) => a.localeCompare(b)).forEach((name) => {
				const option = document.createElement("option");
				option.value = name;
				option.textContent = name;
				departmentSearch.appendChild(option);
			});
			departmentSearch.value = currentValue;
		}

		function renderDepartments() {
			const filteredDepartments = selectedDepartmentName
				? departmentsCache.filter((department) => department.departmentName === selectedDepartmentName)
				: departmentsCache;

			if (filteredDepartments.length === 0) {
				tableContainer.innerHTML = `
					<div class="empty-state">
						<p>No departments found.</p>
					</div>
				`;
				return;
			}

			let tableHTML = `
				<div class="table-wrapper">
					<table>
						<thead>
							<tr>
								<th>Department ID</th>
								<th>Department Name</th>
								<th>Actions</th>
							</tr>
						</thead>
						<tbody>
			`;

			filteredDepartments.forEach((department) => {
				tableHTML += `
					<tr>
						<td>${department.departmentID || "-"}</td>
						<td>${department.departmentName || "-"}</td>
						<td>
							<div class="actions">
								<button class="btn btn-small btn-edit" onclick="editDepartment('${department.id}', '${department.departmentID}', '${department.departmentName}')">Edit</button>
								<button class="btn btn-small btn-delete" onclick="deleteDepartment('${department.id}', '${department.departmentName}')">Delete</button>
							</div>
						</td>
					</tr>
				`;
			});

			tableHTML += `
						</tbody>
					</table>
				</div>
			`;

			tableContainer.innerHTML = tableHTML;
		}

		// Open form for adding new department
		function openFormForAdd() {
			isEditMode = false;
			editDocId = null;
			originalDepartmentID = null;
			formTitle.textContent = "Add New Department";
			submitBtn.textContent = "Add Department";
			form.reset();
			formSection.classList.add("show");
		}

		// Edit department
		window.editDepartment = function(docId, departmentID, departmentName) {
			isEditMode = true;
			editDocId = docId;
			originalDepartmentID = departmentID;

			formTitle.textContent = "Edit Department";
			departmentIDInput.value = departmentID;
			departmentIDInput.disabled = false;
			departmentNameInput.value = departmentName;
			submitBtn.textContent = "Update Department";
			formSection.classList.add("show");
		};

		// Delete department
		window.deleteDepartment = async function(docId, departmentName) {
			const confirmed = confirm(`Are you sure you want to delete "${departmentName}"?\n\nThis action cannot be undone.`);
			
			if (!confirmed) return;

			try {
				await deleteDoc(doc(db, "departments", docId));
				alert("Department deleted successfully!");
				loadDepartments();
			} catch (error) {
				console.error("Error deleting department:", error);
				alert("Failed to delete department. Please try again.");
			}
		};

		// Reset form
		function resetForm() {
			isEditMode = false;
			editDocId = null;
			originalDepartmentID = null;
			formTitle.textContent = "Add New Department";
			form.reset();
			departmentIDInput.disabled = false;
			submitBtn.textContent = "Add Department";
			formSection.classList.remove("show");
		}
	</script>
</body>
</html>
