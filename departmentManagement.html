<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Department Management</title>
	<style>
		:root {
			--bg-1: #f0f4e8;
			--bg-2: #f7f8f3;
			--panel: #ffffff;
			--ink: #1a1f16;
			--muted: #5f6758;
			--brand: #6f7200;
			--brand-2: #8f8336;
			--line: #dfe5d6;
			--success: #0a7f28;
			--error: #c62828;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at 10% 10%, #eef3dc 0, transparent 34%),
				radial-gradient(circle at 90% 80%, #f6edd7 0, transparent 35%),
				linear-gradient(120deg, var(--bg-1), var(--bg-2));
			min-height: 100vh;
			overflow-y: auto;
			padding: 20px;
		}

		.container {
			max-width: 1200px;
			margin: 0 auto;
		}

		.page-header {
			background: rgba(255, 255, 255, 0.95);
			border: 1px solid var(--line);
			border-radius: 14px;
			padding: 24px;
			margin-bottom: 24px;
			box-shadow: 0 4px 12px rgba(12, 20, 7, 0.05);
		}

		.page-header h1 {
			margin: 0;
			font-size: 28px;
			letter-spacing: 0.4px;
			color: #000;
		}

		.add-section {
			background: rgba(255, 255, 255, 0.95);
			border: 1px solid var(--line);
			border-radius: 14px;
			padding: 24px;
			margin-bottom: 24px;
			box-shadow: 0 4px 12px rgba(12, 20, 7, 0.05);
		}

		.add-section h2 {
			margin: 0 0 20px;
			font-size: 20px;
			color: #000;
			text-transform: uppercase;
			letter-spacing: 0.8px;
		}

		.form-row {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 16px;
			margin-bottom: 16px;
		}

		.form-group {
			margin-bottom: 16px;
		}

		.form-group label {
			display: block;
			margin-bottom: 8px;
			font-weight: 600;
			font-size: 14px;
			color: black;
		}

		.form-group label small {
			font-weight: normal;
			font-size: 12px;
			color: var(--muted);
		}

		.form-group input,
		.form-group textarea {
			width: 100%;
			padding: 12px 14px;
			border: 1px solid var(--line);
			border-radius: 8px;
			font-size: 14px;
			background: var(--panel);
			color: var(--ink);
			font-family: inherit;
		}

		.form-group textarea {
			resize: vertical;
			min-height: 80px;
		}

		.form-group input:focus,
		.form-group textarea:focus {
			outline: none;
			border-color: var(--brand);
			box-shadow: 0 0 0 3px rgba(111, 114, 0, 0.1);
		}

		.button-group {
			display: flex;
			gap: 12px;
			margin-top: 20px;
		}

		.btn {
			padding: 12px 24px;
			border: none;
			border-radius: 8px;
			font-size: 15px;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.2s ease;
		}

		.btn-primary {
			background: linear-gradient(135deg, var(--brand), var(--brand-2));
			color: #ffffff;
			flex: 1;
		}

		.btn-primary:hover:not(:disabled) {
			transform: translateY(-2px);
			box-shadow: 0 4px 12px rgba(111, 114, 0, 0.3);
		}

		.btn-primary:disabled {
			opacity: 0.6;
			cursor: not-allowed;
		}

		.btn-secondary {
			background: #f0f4e8;
			color: var(--ink);
			border: 1px solid var(--line);
			flex: 1;
		}

		.btn-secondary:hover {
			background: #e2e8d6;
		}

		.btn-small {
			padding: 6px 12px;
			font-size: 13px;
		}

		.btn-edit {
			background: #4a90e2;
			color: white;
		}

		.btn-edit:hover {
			background: #357abd;
		}

		.btn-delete {
			background: #e74c3c;
			color: white;
		}

		.btn-delete:hover {
			background: #c0392b;
		}

		.table-section {
			background: rgba(255, 255, 255, 0.95);
			border: 1px solid var(--line);
			border-radius: 14px;
			padding: 24px;
			box-shadow: 0 4px 12px rgba(12, 20, 7, 0.05);
		}

		.table-section h2 {
			margin: 0 0 20px;
			font-size: 20px;
			color: #000;
			text-transform: uppercase;
			letter-spacing: 0.8px;
		}

		.table-wrapper {
			overflow-x: auto;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		thead {
			background: #f0f4e8;
		}

		th {
			padding: 14px 12px;
			text-align: left;
			font-weight: 700;
			font-size: 13px;
			color: #000;
			text-transform: uppercase;
			letter-spacing: 0.5px;
			border-bottom: 2px solid var(--line);
		}

		td {
			padding: 14px 12px;
			border-bottom: 1px solid var(--line);
			font-size: 14px;
		}

		tbody tr:hover {
			background: #f8faef;
		}

		.actions {
			display: flex;
			gap: 8px;
		}

		.loading {
			text-align: center;
			padding: 40px 20px;
			color: var(--muted);
		}

		.spinner {
			border: 4px solid #f0f4e8;
			border-top: 4px solid var(--brand);
			border-radius: 50%;
			width: 40px;
			height: 40px;
			animation: spin 1s linear infinite;
			margin: 0 auto 16px;
		}

		@keyframes spin {
			0% { transform: rotate(0deg); }
			100% { transform: rotate(360deg); }
		}

		.empty-state {
			text-align: center;
			padding: 40px 20px;
			color: var(--muted);
		}

		.empty-state p {
			margin: 0;
			font-size: 16px;
		}

		@media (max-width: 768px) {
			.form-row {
				grid-template-columns: 1fr;
			}

			.button-group {
				flex-direction: column;
			}

			.actions {
				flex-direction: column;
			}

			.table-wrapper {
				font-size: 13px;
			}

			th, td {
				padding: 10px 8px;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="page-header">
			<h1>Department Management</h1>
		</div>

		<div class="add-section">
			<h2 id="formTitle">Add New Department</h2>
			<form id="departmentForm">
				<div class="form-row">
					<div class="form-group">
						<label for="departmentID">Department ID </label>
						<input type="text" id="departmentID" name="departmentID" 
							placeholder="e.g., DEP-TRA-001" 
							pattern="DEP-[A-Z]{3}-[0-9]{3}"
							maxlength="12"
							title="Format: DEP-XXX-### (e.g., DEP-TRA-001)"
							required>
					</div>
					<div class="form-group">
						<label for="departmentName">Department Name </label>
						<input type="text" id="departmentName" name="departmentName" 
							placeholder="e.g., Traffic Department" 
							required>
					</div>
				</div>
				
				<div class="button-group">
					<button type="submit" class="btn btn-primary" id="submitBtn">Add Department</button>
					<button type="button" class="btn btn-secondary" id="cancelBtn" style="display: none;">Cancel</button>
				</div>
			</form>
		</div>

		<div class="table-section">
			<h2>All Departments</h2>
			<div id="tableContainer">
				<div class="loading">
					<div class="spinner"></div>
					<p>Loading departments...</p>
				</div>
			</div>
		</div>
	</div>

	<script type="module">
		import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
		import {
			getFirestore,
			collection,
			addDoc,
			getDocs,
			doc,
			updateDoc,
			deleteDoc,
			query,
			where
		} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

		const firebaseConfig = {
			apiKey: "AIzaSyCr5xSS_xPQO38JHoZMufQl-HEltwCvqSk",
			authDomain: "complaint-management-sys-f5d5e.firebaseapp.com",
			projectId: "complaint-management-sys-f5d5e",
			storageBucket: "complaint-management-sys-f5d5e.firebasestorage.app",
			messagingSenderId: "697751596289",
			appId: "1:697751596289:web:cd218934e92411bd7a7f00"
		};

		const app = initializeApp(firebaseConfig);
		const db = getFirestore(app);

		const form = document.getElementById("departmentForm");
		const departmentIDInput = document.getElementById("departmentID");
		const departmentNameInput = document.getElementById("departmentName");
		
		const submitBtn = document.getElementById("submitBtn");
		const cancelBtn = document.getElementById("cancelBtn");
		const formTitle = document.getElementById("formTitle");
		const tableContainer = document.getElementById("tableContainer");

		let isEditMode = false;
		let editDocId = null;
		let originalDepartmentID = null;
		let stationID = null;

		// Get station ID from localStorage
		stationID = localStorage.getItem("policeStationID");

		// Auto-convert department ID to uppercase as user types
		departmentIDInput.addEventListener("input", function(e) {
			this.value = this.value.toUpperCase();
		});

		// Load departments on page load
		loadDepartments();

		// Form submit handler
		form.addEventListener("submit", async (e) => {
			e.preventDefault();

			const departmentID = departmentIDInput.value.trim().toUpperCase();
			const departmentName = departmentNameInput.value.trim();

			// Validation
			if (!departmentID || !departmentName) {
				alert("Department ID and Department Name are required.");
				return;
			}

			// Validate Department ID format: DEP-XXX-###
			const deptIDRegex = /^DEP-[A-Z]{3}-[0-9]{3}$/;
			if (!deptIDRegex.test(departmentID)) {
				alert("Invalid Department ID format.\n\nFormat must be: DEP-XXX-###\n\nExamples:\n• DEP-TRA-001 (Traffic Department)\n• DEP-COM-002 (Community Department)\n• DEP-ENV-003 (Environmental Department)\n\nWhere:\n• XXX = 3 uppercase letters\n• ### = 3 digits (001-999)");
				return;
			}

			if (departmentName.length < 3) {
				alert("Department Name must be at least 3 characters long.");
				return;
			}

			if (!stationID) {
				alert("Station ID not found. Please log in again.");
				return;
			}

			submitBtn.disabled = true;
			submitBtn.textContent = isEditMode ? "Updating..." : "Adding...";

			try {
				if (isEditMode) {
					// If department ID changed, ensure new ID is not already used by another department
					if (departmentID !== originalDepartmentID) {
						const departmentsRef = collection(db, "departments");
						const q = query(
							departmentsRef,
							where("departmentID", "==", departmentID),
							where("stationID", "==", stationID)
						);
						const existingDept = await getDocs(q);

						const duplicateExists = existingDept.docs.some((deptDoc) => deptDoc.id !== editDocId);
						if (duplicateExists) {
							alert("Department ID already exists. Please use a different ID.");
							resetForm();
							submitBtn.disabled = false;
							submitBtn.textContent = "Update Department";
							
                           
                            return;
						}
                        
					}

					// Update existing department
					const docRef = doc(db, "departments", editDocId);
					await updateDoc(docRef, {
						departmentID: departmentID,
						departmentName: departmentName,
						stationID: stationID
					});
					alert("Department updated successfully!");
					resetForm();
				} else {
					// Check if department ID already exists
					const departmentsRef = collection(db, "departments");
					const q = query(
						departmentsRef,
						where("departmentID", "==", departmentID),
						where("stationID", "==", stationID)
					);
					const existingDept = await getDocs(q);

					if (!existingDept.empty) {
						alert("Department ID already exists. Please use a different ID.");
						resetForm();
						submitBtn.disabled = false;
						submitBtn.textContent = "Add Department";
						return;
					}

					// Add new department
					await addDoc(collection(db, "departments"), {
						departmentID: departmentID,
						departmentName: departmentName,
						stationID: stationID,
					});
					alert("Department added successfully!");
					resetForm();
				}

				loadDepartments();
			} catch (error) {
				console.error("Error saving department:", error);
				alert("Failed to save department. Please try again.");
			} finally {
				submitBtn.disabled = false;
				submitBtn.textContent = isEditMode ? "Update Department" : "Add Department";
			}
		});

		// Cancel button handler
		cancelBtn.addEventListener("click", resetForm);

		// Load all departments
		async function loadDepartments() {
			try {
				tableContainer.innerHTML = `
					<div class="loading">
						<div class="spinner"></div>
						<p>Loading departments...</p>
					</div>
				`;

				const departmentsRef = collection(db, "departments");
				const q = stationID 
					? query(departmentsRef, where("stationID", "==", stationID))
					: departmentsRef;
				
				const snapshot = await getDocs(q);

				if (snapshot.empty) {
					tableContainer.innerHTML = `
						<div class="empty-state">
							<p>No departments found. Add your first department above.</p>
						</div>
					`;
					return;
				}

				let tableHTML = `
					<div class="table-wrapper">
						<table>
							<thead>
								<tr>
									<th>Department ID</th>
									<th>Department Name</th>
									<th>Actions</th>
								</tr>
							</thead>
							<tbody>
				`;

				snapshot.forEach((doc) => {
					const data = doc.data();
					
					tableHTML += `
						<tr>
							<td>${data.departmentID}</td>
							<td>${data.departmentName}</td>
							<td>
								<div class="actions">
									<button class="btn btn-small btn-edit" onclick="editDepartment('${doc.id}', '${data.departmentID}', '${data.departmentName}')">Edit</button>
									<button class="btn btn-small btn-delete" onclick="deleteDepartment('${doc.id}', '${data.departmentName}')">Delete</button>
								</div>
							</td>
						</tr>
					`;
				});

				tableHTML += `
							</tbody>
						</table>
					</div>
				`;

				tableContainer.innerHTML = tableHTML;
			} catch (error) {
				console.error("Error loading departments:", error);
				tableContainer.innerHTML = `
					<div class="empty-state">
						<p style="color: var(--error);">Failed to load departments. Please refresh the page.</p>
					</div>
				`;
			}
		}

		// Edit department
		window.editDepartment = function(docId, departmentID, departmentName) {
			isEditMode = true;
			editDocId = docId;
			originalDepartmentID = departmentID;

			formTitle.textContent = "Edit Department";
			departmentIDInput.value = departmentID;
			departmentIDInput.disabled = false;
			departmentNameInput.value = departmentName;
			submitBtn.textContent = "Update Department";
			cancelBtn.style.display = "block";
			document.querySelector(".add-section").scrollIntoView({ behavior: "smooth" });
		};

		// Delete department
		window.deleteDepartment = async function(docId, departmentName) {
			const confirmed = confirm(`Are you sure you want to delete "${departmentName}"?\n\nThis action cannot be undone.`);
			
			if (!confirmed) return;

			try {
				await deleteDoc(doc(db, "departments", docId));
				alert("Department deleted successfully!");
				loadDepartments();
			} catch (error) {
				console.error("Error deleting department:", error);
				alert("Failed to delete department. Please try again.");
			}
		};

		// Reset form
		function resetForm() {
			isEditMode = false;
			editDocId = null;
			originalDepartmentID = null;
			formTitle.textContent = "Add New Department";
			form.reset();
			departmentIDInput.disabled = false;
			submitBtn.textContent = "Add Department";
			cancelBtn.style.display = "none";
		}
	</script>
</body>
</html>
